{% extends "conta_base.html" %}
{% block titulo %}Criar conta{% endblock %}
{% block conteudo %}
<div class="conta-card">
  <div class="card">
    <div class="card-body">
      <h1 class="conta-tit h4 mb-1">Criar conta</h1>
      <p class="text-muted small mb-3">Salve seus dados e acompanhe seus pedidos. Já tem conta?
        <a href="{{ url_for('publico.conta_entrar') }}">Entrar</a>.</p>
      <form method="post" action="{{ url_for('publico.conta_cadastro', next=request.args.get('next')) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-2">
          <label class="form-label small mb-1">Nome*</label>
          <input type="text" name="nome" class="form-control" required value="{{ dados.get('nome', '') }}">
        </div>
        <div class="mb-2">
          <label class="form-label small mb-1">E-mail*</label>
          <input type="email" name="email" class="form-control" required autocomplete="email" value="{{ dados.get('email', '') }}">
        </div>
        <div class="mb-2">
          <label class="form-label small mb-1">Senha* <span class="text-muted">(mín. 6 caracteres)</span></label>
          <input type="password" name="senha" class="form-control" required minlength="6" autocomplete="new-password">
        </div>
        <div class="mb-2">
          <label class="form-label small mb-1">WhatsApp*</label>
          <input type="tel" name="telefone" class="form-control" required placeholder="(00) 00000-0000" value="{{ dados.get('telefone', '') }}">
        </div>
        <details class="mb-2">
          <summary class="small text-muted">Endereço para entrega (opcional)</summary>
          <div class="row g-2 mt-1">
            <div class="col-5"><input type="text" name="cep" class="form-control form-control-sm" placeholder="CEP" value="{{ dados.get('cep', '') }}"></div>
            <div class="col-7"><input type="text" name="logradouro" class="form-control form-control-sm" placeholder="Rua" value="{{ dados.get('logradouro', '') }}"></div>
            <div class="col-4"><input type="text" name="numero" class="form-control form-control-sm" placeholder="Nº" value="{{ dados.get('numero', '') }}"></div>
            <div class="col-8"><input type="text" name="complemento" class="form-control form-control-sm" placeholder="Complemento" value="{{ dados.get('complemento', '') }}"></div>
            <div class="col-12"><input type="text" name="bairro" class="form-control form-control-sm" placeholder="Bairro" value="{{ dados.get('bairro', '') }}"></div>
            <div class="col-9"><input type="text" name="cidade" class="form-control form-control-sm" placeholder="Cidade" value="{{ dados.get('cidade', '') }}"></div>
            <div class="col-3"><input type="text" name="uf" class="form-control form-control-sm" placeholder="UF" maxlength="2" value="{{ dados.get('uf', '') }}"></div>
          </div>
        </details>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" name="aceita_novidades" id="nov" {{ 'checked' if dados.get('aceita_novidades') }}>
          <label class="form-check-label small" for="nov">Quero receber novidades e lançamentos</label>
        </div>
        <button class="btn btn-dark w-100">Criar conta</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
