{% extends "conta_base.html" %}
{% block titulo %}Esqueci a senha{% endblock %}
{% block conteudo %}
<div class="conta-card">
  <div class="card"><div class="card-body">
    <h1 class="conta-tit h4 mb-1">Esqueci a senha</h1>
    <p class="text-muted small mb-3">Digite o e-mail da sua conta. Enviamos um link para você criar uma senha nova.</p>
    <form method="post" action="{{ url_for('publico.conta_esqueci') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label small mb-1">E-mail</label>
        <input type="email" name="email" class="form-control" required autocomplete="email">
      </div>
      <button class="btn btn-dark w-100">Enviar link</button>
    </form>
    <p class="small mt-3 mb-0"><a href="{{ url_for('publico.conta_entrar') }}">Voltar ao login</a></p>
  </div></div>
</div>
{% endblock %}
