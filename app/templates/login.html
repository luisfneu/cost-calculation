<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · Sabrina Hansen Atelier</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Jost:wght@300;400&family=Parisienne&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #b89a78; font-family: 'Jost', sans-serif; min-height: 100vh; display: flex; align-items: center; }
    .cartao { max-width: 360px; margin: 0 auto; background: #f7f1e6; border-radius: 12px; padding: 32px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,.15); }
    .mono { font-family: 'Parisienne', cursive; font-size: 3rem; color: #b08a4f; line-height: 1; }
    .marca { font-family: 'Cormorant Garamond', serif; letter-spacing: 4px; text-transform: uppercase; color: #2c2620; }
    .sub { letter-spacing: 4px; font-size: .65rem; text-transform: uppercase; color: #b08a4f; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="cartao">
      <div class="mono">sh</div>
      <div class="marca">Sabrina Hansen</div>
      <div class="sub">Atelier</div>
      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, m in msgs %}<div class="alert alert-{{ 'danger' if cat=='erro' else 'success' }} py-2">{{ m }}</div>{% endfor %}
      {% endwith %}
      <form method="post">
        <input type="password" name="senha" class="form-control mb-3" placeholder="Senha" autofocus required>
        <button class="btn btn-primary w-100" style="background:#b08a4f;border-color:#b08a4f">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
