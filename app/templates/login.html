<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · Sabrina Hansen Atelier</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/fontes.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/identidade.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <style>
    body { background: var(--mocha); font-family: var(--fonte-corpo); min-height: 100vh; display: flex; align-items: center; }
    .cartao { max-width: 360px; margin: 0 auto; background: var(--cream); border-radius: 12px; padding: 32px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,.15); }
    .mono { font-family: 'Parisienne', cursive; font-size: 3rem; color: var(--gold); line-height: 1; }
    .marca { font-family: var(--fonte-titulo); letter-spacing: 4px; text-transform: uppercase; color: var(--ink); }
    .sub { letter-spacing: 4px; font-size: .65rem; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="cartao">
      <img src="{{ url_for('static', filename='logo.svg') }}" alt="Sabrina Hansen Atelier" style="width:230px; max-width:100%; margin-bottom:18px;">

      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, m in msgs %}<div class="alert alert-{{ 'danger' if cat=='erro' else 'success' }} py-2">{{ m }}</div>{% endfor %}
      {% endwith %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="login" class="form-control mb-2" placeholder="Usuário" autofocus autocomplete="username">
        <input type="password" name="senha" class="form-control mb-3" placeholder="Senha" autocomplete="current-password" required>
        <button class="btn btn-primary w-100" style="background:var(--gold);border-color:var(--gold)">Entrar</button>
        <div class="text-muted mt-2" style="font-size:.75rem">Deixe o usuário em branco para entrar com a senha-mestre.</div>
      </form>
    </div>
  </div>
</body>
</html>
