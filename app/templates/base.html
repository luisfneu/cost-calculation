<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titulo %}Calculadora de Custos{% endblock %} · Sabrina Hansen Atelier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg atelier-nav mb-4">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('main.index') }}">
        <span class="brand-monogram">sh</span>
        <span class="brand-name">
          <span class="brand-title">Sabrina Hansen</span>
          <span class="brand-sub">Atelier</span>
        </span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navmenu">
        <div class="navbar-nav">
          <a class="nav-link" href="{{ url_for('main.index') }}">Painel</a>
          <a class="nav-link" href="{{ url_for('main.listar_pecas') }}">Peças</a>
          <a class="nav-link" href="{{ url_for('main.listar_insumos') }}">Insumos / Estoque</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    {% with mensagens = get_flashed_messages(with_categories=true) %}
      {% for categoria, msg in mensagens %}
        <div class="alert alert-{{ 'danger' if categoria == 'erro' else 'success' }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block conteudo %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/foto-clipboard.js') }}"></script>
</body>
</html>
