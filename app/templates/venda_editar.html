{% extends "base.html" %}
{% block conteudo %}
<h1 class="h3 mb-4">Editar venda #{{ venda.id }}</h1>

<form method="post" class="card card-body bg-white" id="form-venda">
  <table class="table align-middle" id="tabela-itens">
    <thead class="table-light">
      <tr><th style="width:32%">Peça</th><th>Tamanho</th><th>Qtd</th><th>Preço un. (R$)</th><th>Desc. (R$)</th><th>Subtotal</th><th></th></tr>
    </thead>
    <tbody id="linhas-itens"></tbody>
    <tfoot>
      <tr class="fw-bold"><td colspan="5" class="text-end">Total dos itens</td><td id="total-produtos">R$ 0,00</td><td></td></tr>
    </tfoot>
  </table>
  <button type="button" class="btn btn-outline-primary btn-sm mb-4" id="add-item">+ Adicionar item</button>

  <div class="row g-3 align-items-end border-top pt-3">
    <div class="col-md-2">
      <label class="form-label">Frete (R$)</label>
      <input type="text" name="frete" id="in-frete" class="form-control" value="{{ venda.frete | num }}">
    </div>
    <div class="col-md-3 d-flex align-items-center">
      <div class="form-check mt-2">
        <input class="form-check-input" type="checkbox" name="frete_cortesia" id="chk-cortesia" {{ 'checked' if venda.frete_cortesia }}>
        <label class="form-check-label" for="chk-cortesia">Frete cortesia <span class="text-muted small">(custo)</span></label>
      </div>
    </div>
    <div class="col-md-2">
      <label class="form-label">% Marketplace</label>
      <input type="text" name="marketplace_pct" id="in-mkt" class="form-control" value="{{ venda.marketplace_pct | num }}">
    </div>
    <div class="col-md-2">
      <label class="form-label">Desconto total (R$)</label>
      <input type="text" name="desconto_total" id="in-desconto" class="form-control" value="{{ '%.2f'|format(venda.desconto_total) }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Cliente</label>
      <select name="cliente_id" class="form-select">
        <option value="">— sem cliente —</option>
        {% for c in clientes %}
          <option value="{{ c.id }}" {{ 'selected' if c.id == venda.cliente_id }}>{{ c.nome }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-3">
      <label class="form-label">Forma de pagamento</label>
      <select name="forma_pagamento" class="form-select">
        <option value="">—</option>
        {% for f in ['Pix','Dinheiro','Cartão de crédito','Cartão de débito','Transferência','Boleto'] %}
          <option {{ 'selected' if f == venda.forma_pagamento }}>{{ f }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2">
      <label class="form-label">Vencimento</label>
      <input type="date" name="vencimento" class="form-control" value="{{ venda.vencimento.isoformat() if venda.vencimento else '' }}">
    </div>
    <div class="col-md-2 d-flex align-items-center">
      <div class="form-check mt-4">
        <input class="form-check-input" type="checkbox" name="pago" id="chk-pago" {{ 'checked' if venda.pago }}>
        <label class="form-check-label" for="chk-pago">Pago</label>
      </div>
    </div>
    <div class="col-md-4"><div class="small text-muted" id="resumo-venda"></div></div>
    <div class="col-md-3 text-end">
      <button class="btn btn-primary">Salvar alterações</button>
      <a href="{{ url_for('main.listar_vendas') }}" class="btn btn-link">Cancelar</a>
    </div>
  </div>
  <small class="text-muted mt-2">O estoque das peças é ajustado automaticamente conforme a mudança dos itens.</small>
</form>

<script id="dados-pecas" type="application/json">
  [{% for p in pecas %}{"id": {{ p.id }}, "nome": {{ p.nome|tojson }}, "foto": {{ p.foto|tojson }}, "preco": {{ p.preco_etiqueta_efetivo }}, "custo": {{ p.custo_total }}, "estoque": {{ p.estoque_por_tamanho|tojson }}}{{ "," if not loop.last }}{% endfor %}]
</script>
<script id="itens-iniciais" type="application/json">
  [{% for it in venda.itens %}{"peca_id": {{ it.peca_id }}, "nome": {{ it.peca.nome|tojson }}, "foto": {{ it.peca.foto|tojson }}, "tamanho": {{ it.tamanho|tojson }}, "quantidade": {{ it.quantidade }}, "preco": {{ it.preco_unitario }}, "desconto": {{ it.desconto }}, "estoque": {{ it.peca.estoque_por_tamanho|tojson }}}{{ "," if not loop.last }}{% endfor %}]
</script>

<script>
(function () {
  const PECAS = JSON.parse(document.getElementById('dados-pecas').textContent);
  const INICIAIS = JSON.parse(document.getElementById('itens-iniciais').textContent);
  const UPLOADS = "{{ url_for('static', filename='uploads/') }}";
  const corpo = document.getElementById('linhas-itens');
  const brl = v => 'R$ ' + (v || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  const num = t => t ? (parseFloat(String(t).replace('.', '').replace(',', '.')) || 0) : 0;
  const fmt2 = v => (num(v)).toFixed(2).replace('.', ',');
  const acha = id => PECAS.find(p => String(p.id) === String(id));
  const thumb = p => p.foto
    ? `<img src="${UPLOADS}${p.foto}" class="foto-thumb me-2" alt="">`
    : `<span class="foto-thumb sem-foto me-2 d-inline-flex">—</span>`;

  function opcoesMenu() {
    return PECAS.map(p => `
      <button type="button" class="picker-option" data-id="${p.id}">
        ${thumb(p)} <span>${p.nome}</span>
        <span class="small text-muted ms-auto">estoque ${Object.entries(p.estoque).filter(([t,q])=>q>0).map(([t,q])=>t+':'+q).join(' ')}</span>
      </button>`).join('');
  }

  // Preenche tamanhos: inclui os do estoque + o tamanho já usado no item (mesmo com estoque 0).
  function preencherTamanhos(tr, estoque, tamAtual) {
    const sel = tr.querySelector('.sel-tam');
    sel.innerHTML = '<option value="">—</option>';
    const vistos = new Set();
    Object.entries(estoque).forEach(([t, q]) => {
      if (q > 0) { sel.innerHTML += `<option value="${t}">${t} (${q})</option>`; vistos.add(t); }
    });
    if (tamAtual && !vistos.has(tamAtual)) sel.innerHTML += `<option value="${tamAtual}">${tamAtual} (0)</option>`;
    if (tamAtual) sel.value = tamAtual;
  }

  function novaLinha(inicial) {
    const tr = document.createElement('tr');
    tr.className = 'item-row';
    tr.innerHTML = `
      <td>
        <div class="peca-picker">
          <input type="hidden" name="peca_id" class="picker-value">
          <button type="button" class="form-select text-start picker-toggle">Selecione a peça...</button>
          <div class="picker-menu">${opcoesMenu()}</div>
        </div>
      </td>
      <td><select name="tamanho" class="form-select sel-tam"><option value="">—</option></select></td>
      <td><input type="text" name="quantidade" class="form-control in-qtd" value="1" style="width:70px"></td>
      <td><input type="text" name="preco_unitario" class="form-control in-preco" style="width:100px"></td>
      <td><input type="text" name="desconto" class="form-control in-desc" value="0" style="width:90px"></td>
      <td class="subtotal">R$ 0,00</td>
      <td class="text-end"><button type="button" class="btn btn-sm btn-outline-danger rem-item">×</button></td>`;
    corpo.appendChild(tr);
    if (inicial) {
      tr.querySelector('.picker-value').value = inicial.peca_id;
      tr.querySelector('.picker-toggle').innerHTML = `${thumb(inicial)} ${inicial.nome}`;
      preencherTamanhos(tr, inicial.estoque, inicial.tamanho);
      tr.querySelector('.in-qtd').value = String(inicial.quantidade).replace('.', ',');
      tr.querySelector('.in-preco').value = String(inicial.preco.toFixed(2)).replace('.', ',');
      tr.querySelector('.in-desc').value = String((inicial.desconto || 0).toFixed(2)).replace('.', ',');
    }
  }

  function recalcular() {
    let totalProdutos = 0, totalCusto = 0;
    corpo.querySelectorAll('.item-row').forEach(tr => {
      const p = acha(tr.querySelector('.picker-value').value);
      const qtd = num(tr.querySelector('.in-qtd').value);
      const preco = num(tr.querySelector('.in-preco').value);
      const desc = num(tr.querySelector('.in-desc').value);
      const sub = preco * qtd - desc;
      tr.querySelector('.subtotal').textContent = brl(sub);
      totalProdutos += sub;
      if (p) totalCusto += p.custo * qtd;
    });
    document.getElementById('total-produtos').textContent = brl(totalProdutos);
    const frete = num(document.getElementById('in-frete').value);
    const mkt = num(document.getElementById('in-mkt').value);
    const descTotal = num(document.getElementById('in-desconto').value);
    const cortesia = document.getElementById('chk-cortesia').checked;
    const comissao = totalProdutos * mkt / 100;
    // Desconto do pedido reduz só o valor final.
    const receita = totalProdutos + (cortesia ? 0 : frete) - descTotal;
    const custo = totalCusto + comissao + (cortesia ? frete : 0);
    const lucro = receita - custo;
    document.getElementById('resumo-venda').innerHTML =
      `Valor total <b>${brl(receita)}</b> · Custo <b>${brl(custo)}</b> · ` +
      `Lucro <b style="color:${lucro >= 0 ? '#6d7a5c' : '#a5624f'}">${brl(lucro)}</b>`;
  }

  document.getElementById('add-item').addEventListener('click', () => novaLinha());
  corpo.addEventListener('input', recalcular);
  corpo.addEventListener('change', recalcular);
  corpo.addEventListener('click', function (e) {
    const toggle = e.target.closest('.picker-toggle');
    if (toggle) {
      const menu = toggle.nextElementSibling;
      document.querySelectorAll('.picker-menu.aberto').forEach(m => { if (m !== menu) m.classList.remove('aberto'); });
      menu.classList.toggle('aberto');
      return;
    }
    const opt = e.target.closest('.picker-option');
    if (opt) {
      const tr = opt.closest('.item-row');
      const p = acha(opt.dataset.id);
      tr.querySelector('.picker-value').value = p.id;
      tr.querySelector('.picker-toggle').innerHTML = `${thumb(p)} ${p.nome}`;
      tr.querySelector('.picker-menu').classList.remove('aberto');
      preencherTamanhos(tr, p.estoque, null);
      if (tr.querySelector('.in-preco').value === '') tr.querySelector('.in-preco').value = String(p.preco.toFixed(2)).replace('.', ',');
      recalcular();
      return;
    }
    if (e.target.classList.contains('rem-item')) { e.target.closest('.item-row').remove(); recalcular(); }
  });
  corpo.addEventListener('blur', function (e) {
    if (e.target.classList.contains('in-desc')) e.target.value = fmt2(e.target.value);
  }, true);
  document.getElementById('in-desconto').addEventListener('blur', function () { this.value = fmt2(this.value); });
  ['in-frete', 'in-mkt', 'in-desconto'].forEach(id => document.getElementById(id).addEventListener('input', recalcular));
  document.getElementById('chk-cortesia').addEventListener('change', recalcular);
  document.addEventListener('click', function (e) {
    if (!e.target.closest('.peca-picker')) document.querySelectorAll('.picker-menu.aberto').forEach(m => m.classList.remove('aberto'));
  });

  if (INICIAIS.length) INICIAIS.forEach(novaLinha); else novaLinha();
  recalcular();
})();
</script>
{% endblock %}
