<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Etiqueta · {{ peca.nome }}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/fontes.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/identidade.css') }}">
  <style>
    body { font-family: var(--fonte-corpo); background: var(--cream); margin: 0; padding: 24px; text-align: center; }
    /* Moldura em volta do canvas (não sai na impressão/imagem — só guia visual). */
    .etiqueta-wrap { display: inline-block; background: #fff; border: 1px solid var(--gold-soft); border-radius: 10px; padding: 4px; }
    #etiqueta { display: block; width: 300px; height: 500px; }  /* proporção 3:5 = etiqueta 30×50mm */
    .acoes { margin-top: 20px; }
    .acoes select { font-family: var(--fonte-corpo); padding: 7px 10px; border: 1px solid var(--gold-soft); border-radius: 6px; margin-right: 8px; }
    button { font-family: var(--fonte-corpo); padding: 8px 18px; border: 1px solid var(--gold); background: var(--gold); color: #fff; border-radius: 6px; cursor: pointer; margin: 0 4px; }
    button.sec { background: #fff; color: var(--gold); }
    .aviso { color: #a5624f; font-size: .8rem; margin-top: 10px; }
    #qr-oculto { position: absolute; left: -9999px; top: -9999px; }  /* fonte do QR, fora da tela */
    @media print {
      body { background: #fff; padding: 0; }
      .acoes, .aviso { display: none; }
      .etiqueta-wrap { border: none; padding: 0; }
    }
  </style>
</head>
<body>
  <div class="etiqueta-wrap">
    <canvas id="etiqueta" width="900" height="1500"></canvas>  <!-- backing 3× p/ impressão nítida -->
  </div>

  {% if not peca.sku %}
  <div class="aviso">⚠️ Esta peça não tem SKU. <a href="{{ url_for('main.form_peca', peca_id=peca.id) }}">Defina um SKU</a> para o QR funcionar na leitura da venda.</div>
  {% endif %}

  <div class="acoes">
    <label>Tamanho:
      <select id="sel-tam">
        <option value="">— sem tamanho —</option>
        {% for t in tamanhos %}<option value="{{ t }}" {{ 'selected' if t == tam_sel }}>{{ t }}</option>{% endfor %}
      </select>
    </label>
    <button onclick="window.print()">🖨️ Imprimir</button>
    <button class="sec" id="btn-png">🖼️ Salvar imagem</button>
    <a href="{{ url_for('main.detalhe_peca', peca_id=peca.id) }}">voltar</a>
  </div>

  <div id="qr-oculto"></div>

  <script src="{{ url_for('static', filename='js/qrcode.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/etiqueta-draw.js') }}"></script>
  <script>
    const DADOS = {
      sku: {{ (peca.sku or '') | tojson }},
      nome: {{ peca.nome | tojson }},
      colecao: {{ (peca.colecao or '') | tojson }},
      preco: {{ (peca.preco_etiqueta_efetivo | moeda) | tojson }},
    };
    const MONO = {{ url_for('static', filename='monograma.svg') | tojson }};
    const canvas = document.getElementById('etiqueta');
    const selTam = document.getElementById('sel-tam');
    const qrBox  = document.getElementById('qr-oculto');
    let monoImg = null;

    function carregarMono() {
      return new Promise((res) => {
        const img = new Image();
        img.onload = () => { monoImg = img; res(); };
        img.onerror = () => res();
        img.src = MONO;
      });
    }
    function redesenhar() {
      desenharEtiqueta(canvas, { ...DADOS, tam: selTam.value }, monoImg, qrBox);
    }
    async function boot() {
      await carregarMono();
      try { await document.fonts.ready; } catch (e) {}
      redesenhar();
      selTam.addEventListener('change', redesenhar);
      document.getElementById('btn-png').addEventListener('click', () => {
        const tam = selTam.value;
        const a = document.createElement('a');
        a.download = `etiqueta-${DADOS.sku || 'peca'}${tam ? '-' + tam : ''}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      });
    }
    boot();
  </script>
</body>
</html>
