{% extends "conta_base.html" %}
{% block titulo %}Nova senha{% endblock %}
{% block conteudo %}
<div class="conta-card">
  <div class="card"><div class="card-body">
    <h1 class="conta-tit h4 mb-1">Definir nova senha</h1>
    <p class="text-muted small mb-3">Escolha uma senha com ao menos 6 caracteres.</p>
    <form method="post" action="{{ url_for('publico.conta_redefinir', token=token) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label small mb-1">Nova senha</label>
        <input type="password" name="senha" class="form-control" required minlength="6" autocomplete="new-password">
      </div>
      <button class="btn btn-dark w-100">Salvar senha</button>
    </form>
  </div></div>
</div>
{% endblock %}
