{% extends "conta_base.html" %}
{% block titulo %}Entrar{% endblock %}
{% block conteudo %}
<div class="conta-card">
  <div class="card">
    <div class="card-body">
      <h1 class="conta-tit h4 mb-3">Entrar na minha conta</h1>
      <form method="post" action="{{ url_for('publico.conta_entrar', next=request.args.get('next')) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-2">
          <label class="form-label small mb-1">E-mail</label>
          <input type="email" name="email" class="form-control" required autocomplete="email" value="{{ email }}">
        </div>
        <div class="mb-3">
          <label class="form-label small mb-1">Senha</label>
          <input type="password" name="senha" class="form-control" required autocomplete="current-password">
        </div>
        <button class="btn btn-dark w-100">Entrar</button>
      </form>
      <p class="text-muted small mt-3 mb-0 text-center">Ainda não tem conta?
        <a href="{{ url_for('publico.conta_cadastro') }}">Criar conta</a>.</p>
    </div>
  </div>
</div>
{% endblock %}
