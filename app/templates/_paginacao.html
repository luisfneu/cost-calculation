{% if total_paginas > 1 %}
{# Preserva todos os filtros atuais da URL, trocando só o número da página. #}
{% set args = request.args.to_dict() %}
{% set _ = args.pop('pagina', None) %}
<nav class="mt-3">
  <ul class="pagination pagination-sm mb-0 flex-wrap">
    {% for p in range(1, total_paginas + 1) %}
      <li class="page-item {{ 'active' if p == pagina }}">
        <a class="page-link" href="{{ url_for(request.endpoint, pagina=p, **args) }}">{{ p }}</a>
      </li>
    {% endfor %}
  </ul>
</nav>
{% endif %}
